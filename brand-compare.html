<script>
    function scrollCarousel(direction) {
        const carousel = document.getElementById('brand-carousel');
        if (carousel) {
            const scrollAmount = carousel.offsetWidth;
            carousel.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }
    }
</script>
